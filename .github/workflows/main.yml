name: Qemu-Vortax (Tailscale RDP only)

on:
  workflow_dispatch:
    inputs:
      system_choice:
        description: 'Choose a ready system (mint, pear, bazite, kali, bliss_free, bliss_gapps, neon, deepin, garuda_mokka, ubuntu, popos, debian_qcow2, centos_qcow2, kali_qcow2)'
        required: false
        default: ''
      boot_mode:
        description: 'Choose boot type: iso or qcow2'
        required: true
        default: 'iso'
      source_url:
        description: 'Custom source URL (optional)'
        required: false
        default: ''
      vm_name:
        description: 'Name of the system/disk'
        required: true
        default: 'ME2008'
      runtime:
        description: 'Runtime duration in minutes (default 350)'
        required: false
        default: '350'
      bios_mode:
        description: 'Choose firmware mode: UEFI or BIOS (default UEFI)'
        required: true
        default: 'BIOS'

permissions:
  contents: read

jobs:
  setup-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      USERNAME: runner
      PASSWORD: runner
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      FINAL_SOURCE_URL: ''
      RUNNER_TEMP: /mnt/tmp
      ACTIONS_RUNNER_CACHE: /mnt/cache

    steps:
      - uses: actions/checkout@v4

      - name: Prepare user and sudo
        run: |
          echo "${USERNAME}:${PASSWORD}" | sudo chpasswd
          echo "${USERNAME} ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/${USERNAME}
          sudo mkdir -p /mnt/tmp /mnt/cache
          sudo chmod -R 777 /mnt/tmp /mnt/cache

      - name: Setup Tailscale (Tailscale + set RDP connection)
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo tailscale up --authkey "${TAILSCALE_AUTHKEY}" --hostname "gh-xfce-vm-${{ github.run_id }}" --accept-routes --accept-dns=false
          TS_IP=$(sudo tailscale ip -4 | head -n1)
          echo "CONNECTION_IP=$TS_IP" >> $GITHUB_ENV
          echo "CONNECTION_TYPE=Tailscale" >> $GITHUB_ENV

      - name: Install XFCE + xrdp + NoMachine (NoMachine retained but optional)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq wget qemu-utils
          wget -q https://web9001.nomachine.com/download/9.2/Linux/nomachine_9.2.18_3_amd64.deb -O nomachine.deb
          sudo dpkg -i nomachine.deb || sudo apt-get -f install -y
          rm nomachine.deb
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq xfce4 xfce4-goodies xorg dbus-x11 xrdp qemu-system-x86 ovmf novnc websockify unzip p7zip-full unrar-free tar python3-pip
          echo "startxfce4" | sudo tee /home/${USERNAME}/.xsession
          sudo chown ${USERNAME}:${USERNAME} /home/${USERNAME}/.xsession
          echo "exec startxfce4" | sudo tee /etc/skel/.xsession
          echo "startxfce4" | sudo tee /etc/skel/.xinitrc
          # Only open RDP port (other ports removed since Tailscale handles routing)
          sudo ufw allow 3389/tcp || true
          sudo ufw --force enable || true
          sudo systemctl enable --now xrdp
          sudo systemctl restart xrdp

      - name: Install QEMU helpers and badown
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git curl wget
          pip install internetarchive --quiet || true
          git clone https://github.com/stck-lzm/badown ~/badown || true
          chmod +x ~/badown/badown || true

      - name: Determine source URL
        id: determine_url
        run: |
          CHOICE="${{ github.event.inputs.system_choice }}"
          USER_URL="${{ github.event.inputs.source_url }}"

          declare -A ISO_URLS
          ISO_URLS["mint"]="https://pub.linuxmint.io/stable/22.2/linuxmint-22.2-cinnamon-64bit.iso"
          ISO_URLS["pear"]="https://www.mediafire.com/file/7ztcyqd2ggiv58p/pearOS-NiceC0re-2025.11-x86_64.iso"
          ISO_URLS["bazite"]="https://download.bazzite.gg/bazzite-stable-live.iso"
          ISO_URLS["kali"]="https://kali.download/base-images/kali-2025.3/kali-linux-2025.3-live-amd64.iso"
          ISO_URLS["bliss_gapps"]="https://dn720203.ca.archive.org/0/items/Bliss-v15.9-x86_64-OFFICIAL-gapps-20240114/Bliss-v15.9-x86_64-OFFICIAL-gapps-20240114.iso"
          ISO_URLS["neon"]="https://mirrors.xtom.de/kde-application/neon/images/user/current/neon-user-current.iso"
          ISO_URLS["deepin"]="https://cdimage-cdn77.deepin.com/deepin-cd/25.0.1/amd64/deepin-desktop-community-25.0.1-amd64.iso"
          ISO_URLS["garuda_mokka"]="https://r2.garudalinux.org/iso/garuda/mokka/251002/garuda-mokka-linux-zen-251002.iso?r2request"
          ISO_URLS["ubuntu"]="https://releases.ubuntu.com/25.10/ubuntu-25.10-desktop-amd64.iso"
          ISO_URLS["popos"]="https://iso.pop-os.org/22.04/amd64/intel/58/pop-os_22.04_amd64_intel_58.iso"

          declare -A QCOW2_URLS
          QCOW2_URLS["debian_qcow2"]="https://chuangtzu.ftp.acc.umu.se/images/cloud/bookworm/20251006-2257/debian-12-generic-amd64-20251006-2257.qcow2"
          QCOW2_URLS["centos_qcow2"]="https://cloud.centos.org/centos/10-stream/x86_64/images/CentOS-Stream-GenericCloud-x86_64-10-latest.x86_64.qcow2"
          QCOW2_URLS["kali_qcow2"]="https://kali.mirror.garr.it/kali-images/current/kali-linux-2025.3-qemu-amd64.7z"

          FINAL_URL="$USER_URL"
          if [[ -z "$FINAL_URL" && -n "$CHOICE" ]]; then
            FINAL_URL="${ISO_URLS[$CHOICE]}"
            if [[ -z "$FINAL_URL" ]]; then
              FINAL_URL="${QCOW2_URLS[$CHOICE]}"
            fi
          fi

          if [[ -z "$FINAL_URL" ]]; then
            FINAL_URL="${ISO_URLS["bliss_gapps"]}"
          fi

          echo "FINAL_SOURCE_URL=$FINAL_URL" >> $GITHUB_ENV

      - name: Configure VM specs
        run: |
          DISK=60
          if [ "${{ github.event.repository.private }}" = "true" ]; then
            RAM=6
          else
            RAM=14
          fi
          VCPUS=2
          echo "RAM=$RAM" >> $GITHUB_ENV
          echo "DISK=$DISK" >> $GITHUB_ENV
          echo "VCPUS=$VCPUS" >> $GITHUB_ENV

      - name: Prepare files and disks (download & validate)
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.boot_mode }}"
          SRC="${{ env.FINAL_SOURCE_URL }}"
          VM="${{ github.event.inputs.vm_name }}"
          DISK="${{ env.DISK }}"
          HOME_PATH="$HOME"
          MNT_PATH="/mnt"
          TEMP_PATH="/mnt/tmp_unpack"
          FILE_PATH="$TEMP_PATH/source_file"
          sudo mkdir -p "$TEMP_PATH"
          sudo chmod 777 "$TEMP_PATH"

          sudo rm -f .badown.tmp || true

          if [[ "$SRC" == *"archive.org/download/"* ]]; then
            ITEM=$(basename "$(dirname "$SRC")")
            FILE=$(basename "$SRC")
            ia download "$ITEM" "$FILE"
            FOUND_FILE=$(find . -type f -name "$FILE" | head -n1)
            if [ -f "$FOUND_FILE" ]; then
              sudo mv "$FOUND_FILE" "$FILE_PATH"
            else
              echo "::error::No valid file found from archive.org"
              exit 1
            fi

          elif [[ "$SRC" == *"mediafire.com"* || "$SRC" == *"mega.nz"* ]]; then
            cd ~/badown || { echo "::error::can't cd to ~/badown"; exit 1; }
            OUTLOG="/tmp/badown_download.log"
            : > "$OUTLOG"
            sudo stdbuf -oL ./badown "$SRC" 2>&1 | tee "$OUTLOG" &
            BADOWN_PID=$!
            last_progress=""
            while kill -0 $BADOWN_PID 2>/dev/null; do
              new_progress=$(grep -Eo '[0-9]{1,3}%' "$OUTLOG" | tail -n1 || true)
              if [[ -n "$new_progress" && "$new_progress" != "$last_progress" ]]; then
                echo "Downloading... $new_progress"
                last_progress="$new_progress"
              else
                echo "Downloading..."
              fi
              sleep 5
            done

            wait $BADOWN_PID
            BADOWN_EXIT=$?

            FOUND_FILE=$(find . -type f ! -name 'badown' ! -name '*.sh' ! -name '*.log' -printf '%T@ %p\n' 2>/dev/null | sort -n | tail -n1 | cut -d' ' -f2- || true)
            if [[ -n "$FOUND_FILE" ]]; then
              FOUND_SIZE=$(stat -c%s "$FOUND_FILE" 2>/dev/null || echo 0)
              if [[ "$FOUND_SIZE" -gt 1024 ]]; then
                sudo mv "$FOUND_FILE" "$FILE_PATH"
              else
                echo "::error::Found file but it's too small: $FOUND_FILE ($FOUND_SIZE bytes)."
                tail -n 200 "$OUTLOG" || true
                exit 1
              fi
            else
              echo "::error::badown exited with code $BADOWN_EXIT and no downloaded file was found"
              tail -n 300 "$OUTLOG" || true
              exit 1
            fi

            sudo rm -f .badown.tmp || true

          else
            sudo wget -q --user-agent="Mozilla/5.0" --trust-server-names --content-disposition -O "$FILE_PATH" "$SRC"
          fi

          if [ ! -f "$FILE_PATH" ]; then
            echo "::error::Expected file not found at $FILE_PATH"
            exit 1
          fi
          FILESIZE=$(stat -c%s "$FILE_PATH" 2>/dev/null || echo 0)
          if [ "$FILESIZE" -le 1024 ]; then
            echo "::error::Downloaded file looks too small ($FILESIZE bytes)."
            file "$FILE_PATH" || true
            exit 1
          fi

          MIME=$(file -b --mime-type "$FILE_PATH" || true)
          echo "Detected mime/type: $MIME for $FILE_PATH"

          if [[ "$MIME" == *"iso"* && "$MODE" == "iso" ]]; then
            sudo mv "$FILE_PATH" "$HOME_PATH/${VM}.iso"
            sudo qemu-img create -f qcow2 "$MNT_PATH/${VM}.qcow2" "${DISK}G"
          elif [[ "$MIME" == *"iso"* && "$MODE" == "qcow2" ]]; then
            sudo mv "$FILE_PATH" "$HOME_PATH/${VM}.iso"
            sudo qemu-img create -f qcow2 "$MNT_PATH/${VM}.qcow2" "${DISK}G"
          elif file "$FILE_PATH" | grep -qi 'qcow'; then
            sudo mv "$FILE_PATH" "$MNT_PATH/${VM}.qcow2"
          elif file "$FILE_PATH" | grep -Ei 'raw|disk image|x-raw|filesystem' >/dev/null 2>&1; then
            sudo qemu-img convert -f raw -O qcow2 "$FILE_PATH" "$MNT_PATH/${VM}.qcow2" || { echo "::error::qemu-img convert failed"; exit 1; }
          else
            sudo mv "$FILE_PATH" "$MNT_PATH/${VM}.qcow2"
          fi

          if [ ! -f "$MNT_PATH/${VM}.qcow2" ]; then
            echo "::error::Final VM disk not present at $MNT_PATH/${VM}.qcow2"
            ls -l "$MNT_PATH" || true
            exit 1
          fi
          file -k "$MNT_PATH/${VM}.qcow2" || true
          stat -c "%n %s %F" "$MNT_PATH/${VM}.qcow2" || true

          sudo rm -rf "$TEMP_PATH" || true

      - name: Run the VM
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.boot_mode }}"
          BIOS_MODE="${{ github.event.inputs.bios_mode }}"
          VM="${{ github.event.inputs.vm_name }}"
          VCPUS="${{ env.VCPUS }}"
          RAM="${{ env.RAM }}"
          HOME_PATH="$HOME"
          MNT_PATH="/mnt"
          ISO_PATH="$HOME_PATH/${VM}.iso"
          DISK_PATH="$MNT_PATH/${VM}.qcow2"

          wget -q https://gitlab.com/MR.English2008/qemu-pre-build-ovfm.fd-files/-/raw/main/OVMF_CODE.fd -O OVMF_CODE.fd
          wget -q https://gitlab.com/MR.English2008/qemu-pre-build-ovfm.fd-files/-/raw/main/OVMF_VARS.fd -O OVMF_VARS.fd
          CODE_PATH=./OVMF_CODE.fd
          VARS_PATH=./OVMF_VARS.fd

          if [ ! -f "$DISK_PATH" ]; then
            sudo qemu-img create -f qcow2 "$DISK_PATH" "${DISK}G" || true
          fi

          if [ "$BIOS_MODE" = "UEFI" ]; then
            if [ -f "$ISO_PATH" ]; then
              sudo qemu-system-x86_64 \
                -enable-kvm \
                -cpu host \
                -smp ${VCPUS} \
                -m ${RAM}G \
                -boot d \
                -cdrom "$ISO_PATH" \
                -drive if=none,id=hd0,file="$DISK_PATH",format=qcow2 \
                -device virtio-blk-pci,drive=hd0 \
                -drive if=pflash,format=raw,readonly=on,file="$CODE_PATH" \
                -drive if=pflash,format=raw,file="$VARS_PATH" \
                -vnc :0 \
                -display none \
                -netdev user,id=net0 \
                -device e1000,netdev=net0 \
                -device usb-ehci,id=ehci \
                -device usb-tablet,bus=ehci.0 \
                -name "$VM" &
            else
              sudo qemu-system-x86_64 \
                -enable-kvm \
                -cpu host \
                -smp ${VCPUS} \
                -m ${RAM}G \
                -drive if=none,id=hd0,file="$DISK_PATH",format=qcow2 \
                -device virtio-blk-pci,drive=hd0 \
                -drive if=pflash,format=raw,readonly=on,file="$CODE_PATH" \
                -drive if=pflash,format=raw,file="$VARS_PATH" \
                -boot c \
                -vnc :0 \
                -display none \
                -netdev user,id=net0 \
                -device e1000,netdev=net0 \
                -device usb-ehci,id=ehci \
                -device usb-tablet,bus=ehci.0 \
                -name "$VM" &
            fi
          else
            if [ -f "$ISO_PATH" ]; then
              sudo qemu-system-x86_64 \
                -enable-kvm \
                -cpu host \
                -smp ${VCPUS} \
                -m ${RAM}G \
                -boot d \
                -cdrom "$ISO_PATH" \
                -drive if=none,id=hd0,file="$DISK_PATH",format=qcow2 \
                -device virtio-blk-pci,drive=hd0 \
                -vnc :0 \
                -display none \
                -netdev user,id=net0 \
                -device e1000,netdev=net0 \
                -device usb-ehci,id=ehci \
                -device usb-tablet,bus=ehci.0 \
                -name "$VM" &
            else
              sudo qemu-system-x86_64 \
                -enable-kvm \
                -cpu host \
                -smp ${VCPUS} \
                -m ${RAM}G \
                -drive if=none,id=hd0,file="$DISK_PATH",format=qcow2 \
                -device virtio-blk-pci,drive=hd0 \
                -boot c \
                -vnc :0 \
                -display none \
                -netdev user,id=net0 \
                -device e1000,netdev=net0 \
                -device usb-ehci,id=ehci \
                -device usb-tablet,bus=ehci.0 \
                -name "$VM" &
            fi
          fi
          echo "VM started successfully."

      - name: Connection Information and Keep Alive (Tailscale RDP)
        run: |
          echo "=== CONNECTION INFORMATION ==="
          echo "RDP Username: ${USERNAME}"
          echo "RDP Password: ${PASSWORD}"
          echo
          echo "Connection Type: ${{ env.CONNECTION_TYPE }}"
          echo
          echo ">>> RDP Connection: ${{ env.CONNECTION_IP }}:3389"
          echo
          RUNTIME="${{ github.event.inputs.runtime }}"
          echo "Keeping the session alive for ${RUNTIME} minutes..."
          sleep $((RUNTIME * 60))
          echo "Session ended after ${RUNTIME} minutes."
